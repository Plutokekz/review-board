name: release

# Cross-compiles the reviewd server for common platforms and attaches the
# binaries to a GitHub Release. Triggered by pushing a v* tag (e.g. v0.1.0),
# or manually. The /review and /review-server skills download the matching
# binary from the latest release, so users don't need Go installed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: '' }
          - { goos: linux,   goarch: arm64, ext: '' }
          - { goos: darwin,  goarch: amd64, ext: '' }
          - { goos: darwin,  goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build reviewd
        working-directory: reviewd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o "reviewd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: reviewd/reviewd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
